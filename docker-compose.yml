version: "3.9"

services:
  mongo:
    image: mongodb/mongodb-community-server:latest
    container_name: soc_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
      - ./database/mongo:/docker-entrypoint-initdb.d
    ports:
      - "27017:27017"

  mysql:
    image: mysql:latest
    container_name: soc_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/sql:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"

  backend:
    image: muhammadabdullah12/soc_casemanagment-backend
    container_name: soc_backend
    restart: unless-stopped
    depends_on:
      - mongo
      - mysql
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - /var/log/suricata:/var/log/suricata:ro
    stdin_open: true
    tty: true


volumes:
  mongo_data:
  mysql_data:
